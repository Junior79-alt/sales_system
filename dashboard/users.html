<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ===== STYLES ZA USER MANAGEMENT ===== */
        .users-container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            overflow-x: auto;
        }

        .users-container h2 {
            color: #1a237e;
            font-size: 18px;
            margin-bottom: 15px;
        }

        .activate-form {
            background: #e8eaf6;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .activate-form h3 {
            width: 100%;
            color: #1a237e;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .activate-form p {
            width: 100%;
            font-size: 13px;
            color: #555;
            margin-bottom: 5px;
        }

        .activate-form input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            min-width: 200px;
        }

        .activate-form button {
            padding: 10px 25px;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }

        .activate-form button:hover {
            background: #1b5e20;
        }

        .msg {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            display: none;
            font-size: 14px;
        }

        .msg.success {
            display: block;
            background: #c8e6c9;
            color: #1b5e20;
        }

        .msg.error {
            display: block;
            background: #ffcdd2;
            color: #b71c1c;
        }

        .msg.info {
            display: block;
            background: #bbdefb;
            color: #0d47a1;
        }

        /* ===== TABLE ===== */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            min-width: 600px;
        }

        th {
            background: #1a237e;
            color: white;
            padding: 10px 12px;
            text-align: left;
            white-space: nowrap;
        }

        td {
            padding: 8px 12px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f5f5f5;
        }

        .user-status {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            white-space: nowrap;
        }

        .user-status.active {
            background: #4caf50;
            color: white;
        }

        .user-status.inactive {
            background: #f44336;
            color: white;
        }

        .action-btn {
            padding: 4px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            margin: 2px;
            white-space: nowrap;
        }

        .action-btn.activate {
            background: #4caf50;
            color: white;
        }

        .action-btn.activate:hover {
            background: #388e3c;
        }

        .action-btn.deactivate {
            background: #ff9800;
            color: white;
        }

        .action-btn.deactivate:hover {
            background: #f57c00;
        }

        .action-btn.delete {
            background: #d32f2f;
            color: white;
        }

        .action-btn.delete:hover {
            background: #b71c1c;
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 15px;
            color: #1a237e;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .no-users {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        /* ===== MOBILE ===== */
        @media (max-width: 768px) {
            .activate-form {
                flex-direction: column;
                align-items: stretch;
            }

            .activate-form input {
                min-width: auto;
                width: 100%;
            }

            .activate-form button {
                width: 100%;
            }

            table {
                font-size: 12px;
                min-width: 500px;
            }

            th,
            td {
                padding: 6px 8px;
            }

            .action-btn {
                font-size: 10px;
                padding: 3px 8px;
            }
        }

        @media (max-width: 480px) {
            table {
                font-size: 11px;
                min-width: 400px;
            }

            th,
            td {
                padding: 4px 6px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>👥 USER MANAGEMENT</h1>
            <div class="header-right">
                <span id="adminName">Admin</span>
                <button onclick="logout()" class="logout-btn">🚪 Toka</button>
            </div>
        </header>

        <a href="index.html" class="back-link">← Rudi Dashboard</a>

        <!-- FORM YA KU-ACTIVATE -->
        <div class="activate-form">
            <h3>🔓 Activate Staff</h3>
            <p>Weka email ya staff unayetaka ku-activate</p>
            <input type="email" id="activateEmail" placeholder="Ingiza email ya staff">
            <button onclick="activateByEmail()">✅ ACTIVATE</button>
            <div id="activateMsg" class="msg"></div>
        </div>

        <!-- ORODHA YA WATUMIAJI -->
        <div class="users-container">
            <h2>Watumiaji Wote</h2>
            <div id="usersList"><p style="text-align:center;padding:20px;">Loading...</p></div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        const token = localStorage.getItem('token');

        // ===== LOGOUT =====
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('userEmail');
            localStorage.removeItem('userRole');
            window.location.href = 'login.html';
        }

        // ===== CHECK LOGIN =====
        if (!token) {
            window.location.href = 'login.html';
        }

        // ===== SHOW MESSAGE =====
        function showMessage(element, text, type) {
            element.textContent = text;
            element.className = 'msg ' + type;
        }

        // ===== ACTIVATE BY EMAIL =====
        async function activateByEmail() {
            const email = document.getElementById('activateEmail').value.trim();
            const msg = document.getElementById('activateMsg');

            if (!email) {
                showMessage(msg, '❌ Tafadhali ingiza email!', 'error');
                return;
            }

            showMessage(msg, '⏳ Ina-activate...', 'info');

            try {
                const response = await fetch(
                    `${API_URL}/users/activate_by_email?email=${encodeURIComponent(email)}`, {
                        method: 'POST'
                    }
                );

                const data = await response.json();

                if (response.ok) {
                    showMessage(msg, `✅ ${data.message}`, 'success');
                    document.getElementById('activateEmail').value = '';
                    loadUsers();
                } else {
                    showMessage(msg, `❌ ${data.detail || 'Activation failed!'}`, 'error');
                }
            } catch (error) {
                showMessage(msg, `❌ Error: ${error.message}`, 'error');
            }
        }

        // ===== DELETE USER =====
        async function deleteUser(userId, userName) {
            if (!confirm(`⚠️ Je, una uhakika unataka KUFUTA user "${userName}" kabisa? Hatua hii haiwezi kurekebishwa!`)) {
                return;
            }

            try {
                const response = await fetch(`${API_URL}/users/${userId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    alert(`✅ User "${userName}" amefutwa!`);
                    loadUsers();
                } else {
                    alert(`❌ ${data.detail || 'Failed to delete user!'}`);
                }
            } catch (error) {
                console.error('Delete error:', error);
                alert(`❌ Error: ${error.message}`);
            }
        }

        // ===== LOAD USERS =====
        async function loadUsers() {
            try {
                const response = await fetch(`${API_URL}/users/all`, {
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });

                if (!response.ok) {
                    if (response.status === 403) {
                        document.getElementById('usersList').innerHTML = '<p style="color:red;">❌ Una hitaji kuwa Admin kuona ukurasa huu.</p>';
                        return;
                    }
                    throw new Error('Failed to load users');
                }

                const users = await response.json();
                const container = document.getElementById('usersList');

                if (!users || users.length === 0) {
                    container.innerHTML = '<p class="no-users">Hakuna watumiaji waliopo</p>';
                    return;
                }

                let html = `
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Jina</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Status</th>
                                <th>Vitendo</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                users.forEach((u, i) => {
                    const isActive = u.is_active === 1;

                    html += `
                        <tr>
                            <td>${i + 1}</td>
                            <td><strong>${u.name}</strong></td>
                            <td>${u.email}</td>
                            <td>${u.role}</td>
                            <td>
                                <span class="user-status ${isActive ? 'active' : 'inactive'}">
                                    ${isActive ? '✅ Active' : '❌ Inactive'}
                                </span>
                            </td>
                            <td>
                                ${!isActive && u.role.toLowerCase() !== 'admin' ? `
                                    <button class="action-btn activate" onclick="activateByEmail()">✅ Activate</button>
                                ` : ''}
                                ${isActive && u.role.toLowerCase() !== 'admin' ? `
                                    <button class="action-btn deactivate" onclick="deactivateUser(${u.id})">⏸️ Deactivate</button>
                                ` : ''}
                                ${u.role.toLowerCase() !== 'admin' ? `
                                    <button class="action-btn delete" onclick="deleteUser(${u.id}, '${u.name}')">🗑️ Futa</button>
                                ` : `
                                    <span style="color:#999;font-size:12px;">Haiwezi kufutwa</span>
                                `}
                            </td>
                        </tr>
                    `;
                });

                html += '</tbody></table>';
                container.innerHTML = html;

                // Update admin name
                const adminUser = users.find(u => u.role.toLowerCase() === 'admin' && u.is_active === 1);
                if (adminUser) {
                    document.getElementById('adminName').textContent = adminUser.email;
                }

            } catch (error) {
                document.getElementById('usersList').innerHTML = `<p style="color:red;">❌ Error: ${error.message}</p>`;
            }
        }

        // ===== DEACTIVATE USER =====
        async function deactivateUser(id) {
            if (!confirm('Je, una uhakika unataka ku-DEACTIVATE user huyu?')) return;

            try {
                const response = await fetch(`${API_URL}/users/deactivate/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    alert('⏸️ User deactivated!');
                    loadUsers();
                } else {
                    alert(`❌ ${data.detail || 'Failed to deactivate user!'}`);
                }
            } catch (error) {
                console.error('Deactivate error:', error);
                alert(`❌ Error: ${error.message}`);
            }
        }

        // ===== ENTER KEY =====
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const input = document.getElementById('activateEmail');
                if (document.activeElement === input) {
                    activateByEmail();
                }
            }
        });

        // ===== LOAD USERS =====
        loadUsers();

        // ===== AUTO REFRESH =====
        setInterval(loadUsers, 30000);
    </script>
</body>
</html>
