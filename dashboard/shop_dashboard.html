<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f0f2f5; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }

        header {
            background: linear-gradient(135deg, #2e7d32, #1b5e20);
            color: white;
            padding: 20px 30px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        header h1 { font-size: 24px; }
        .logout-btn {
            background: #d32f2f;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }
        .logout-btn:hover { background: #b71c1c; }

        .add-sale-form {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        .add-sale-form h2 { color: #1a237e; margin-bottom: 15px; }
        .add-sale-form .form-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .add-sale-form input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            min-width: 150px;
        }
        .add-sale-form button {
            padding: 12px 30px;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        .add-sale-form button:hover { background: #1b5e20; }
        .add-sale-form .msg { margin-top: 10px; padding: 10px; border-radius: 6px; font-weight: bold; display: none; }
        .add-sale-form .msg.success { display: block; background: #c8e6c9; color: #1b5e20; }
        .add-sale-form .msg.error { display: block; background: #ffcdd2; color: #b71c1c; }

        .sales-cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }
        .sale-card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-left: 5px solid #1a237e;
        }
        .sale-card .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .sale-card .card-header .product-name {
            font-size: 18px;
            font-weight: bold;
            color: #1a237e;
        }
        .sale-card .card-body {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }
        .sale-card .card-body .info-item {
            text-align: center;
            padding: 8px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .sale-card .card-body .info-item .label {
            font-size: 11px;
            color: #888;
            display: block;
        }
        .sale-card .card-body .info-item .value {
            font-size: 16px;
            font-weight: bold;
            color: #1a237e;
        }
        .sale-card .card-body .info-item .value.amount { color: #2e7d32; }
        .sale-card .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 10px;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: #888;
            flex-wrap: wrap;
            gap: 8px;
        }
        .no-sales { text-align: center; padding: 40px; color: #999; font-size: 16px; }

        .user-info {
            color: white;
            margin-right: 15px;
            font-weight: 500;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .stat-card h3 { font-size: 14px; color: #666; margin-bottom: 5px; }
        .stat-card p { font-size: 24px; font-weight: bold; color: #1a237e; }

        .staff-note {
            background: #fff3e0;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #ffcc80;
            font-size: 13px;
            color: #555;
            text-align: center;
        }
        .staff-note strong { color: #e65100; }

        @media (max-width: 600px) {
            .add-sale-form .form-row { flex-direction: column; }
            .add-sale-form input { min-width: auto; width: 100%; }
            .add-sale-form button { width: 100%; }
            .sales-cards-grid { grid-template-columns: 1fr; }
            .sale-card .card-body { grid-template-columns: 1fr 1fr; }
            header { flex-direction: column; text-align: center; }
            .header-right { margin-top: 10px; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
        }

        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏪 SHOP DASHBOARD</h1>
            <div class="header-right">
                <span class="user-info" id="staffName">Shop Staff</span>
                <button onclick="logout()" class="logout-btn">🚪 Toka</button>
            </div>
        </header>

        <div class="staff-note">
            ⚠️ <strong>Kumbuka:</strong> Huwezi kufuta mauzo. Ikiwa unahitaji kufuta, wasiliana na <strong>Admin</strong>.
        </div>

        <div class="stats-grid">
            <div class="stat-card"><h3>💰 Jumla ya Mauzo Yangu</h3><p id="myTotalSales">0 TSh</p></div>
            <div class="stat-card"><h3>📦 Bidhaa Zangu</h3><p id="myProductCount">0</p></div>
            <div class="stat-card"><h3>📋 Mauzo Yangu</h3><p id="mySaleCount">0</p></div>
        </div>

        <div class="add-sale-form">
            <h2>📝 Ongeza Mauzo</h2>
            <div class="form-row">
                <input type="text" id="productName" placeholder="📦 Jina la bidhaa">
                <input type="number" id="quantity" placeholder="🔢 Idadi">
                <input type="number" id="price" placeholder="💰 Bei (TSh)">
                <button onclick="addSale()">💾 HIFADHI</button>
            </div>
            <div id="saleMsg" class="msg"></div>
        </div>

        <div style="background:white; padding:20px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.1);">
            <h2 style="color:#1a237e; margin-bottom:15px;">📋 Mauzo Yangu</h2>
            <div id="salesList" class="sales-cards-grid"><p class="no-sales">Loading...</p></div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        const token = localStorage.getItem('token');

        if (!token) { window.location.href = 'login.html'; }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('userEmail');
            localStorage.removeItem('userRole');
            localStorage.removeItem('staffType');
            window.location.href = 'login.html';
        }

        function showMessage(element, text, type) {
            element.textContent = text;
            element.className = 'msg ' + type;
        }

        async function addSale() {
            const product = document.getElementById('productName').value.trim();
            const quantity = document.getElementById('quantity').value.trim();
            const price = document.getElementById('price').value.trim();
            const msg = document.getElementById('saleMsg');

            if (!product || !quantity || !price) {
                showMessage(msg, '❌ Tafadhali jaza sehemu zote!', 'error');
                return;
            }

            if (parseInt(quantity) <= 0 || parseFloat(price) <= 0) {
                showMessage(msg, '❌ Idadi na bei ziwe kubwa kuliko sifuri!', 'error');
                return;
            }

            showMessage(msg, '⏳ Inahifadhi...', 'success');

            try {
                const response = await fetch(
                    `${API_URL}/sales/?product_name=${encodeURIComponent(product)}&quantity=${parseInt(quantity)}&price=${parseFloat(price)}`,
                    { method: 'POST', headers: { 'Authorization': 'Bearer ' + token } }
                );

                const data = await response.json();

                if (response.ok) {
                    showMessage(msg, '✅ ' + data.message, 'success');
                    document.getElementById('productName').value = '';
                    document.getElementById('quantity').value = '';
                    document.getElementById('price').value = '';
                    loadMySales();
                } else {
                    showMessage(msg, '❌ ' + (data.detail || 'Failed!'), 'error');
                }
            } catch (error) {
                showMessage(msg, '❌ Error: ' + error.message, 'error');
            }
        }

        async function loadMySales() {
            try {
                const res = await fetch(`${API_URL}/sales/`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (!res.ok) {
                    if (res.status === 403) { window.location.href = 'agent_dashboard.html'; return; }
                    throw new Error('Failed to load sales');
                }

                const sales = await res.json();
                const container = document.getElementById('salesList');

                let totalAmount = 0, totalProducts = 0;
                sales.forEach(s => {
                    totalAmount += s.total_amount || 0;
                    totalProducts += s.quantity || 0;
                });

                document.getElementById('myTotalSales').textContent = totalAmount.toLocaleString() + ' TSh';
                document.getElementById('myProductCount').textContent = totalProducts;
                document.getElementById('mySaleCount').textContent = sales.length;

                try {
                    const userRes = await fetch(`${API_URL}/users/me`, {
                        headers: { 'Authorization': 'Bearer ' + token }
                    });
                    if (userRes.ok) {
                        const userData = await userRes.json();
                        document.getElementById('staffName').textContent = userData.name || 'Shop Staff';
                    }
                } catch (e) {}

                if (!sales || sales.length === 0) {
                    container.innerHTML = '<p class="no-sales">📭 Hakuna mauzo yako</p>';
                    return;
                }

                let html = '';
                sales.forEach((s, i) => {
                    const date = s.date ? new Date(s.date).toLocaleString('sw-TZ') : '-';
                    const total = (s.total_amount || 0).toLocaleString();
                    const price = (s.price || 0).toLocaleString();

                    html += `<div class="sale-card" style="border-left-color: ${i % 2 === 0 ? '#1a237e' : '#2e7d32'};">
                        <div class="card-header"><span class="product-name">${s.product_name || '-'}</span><span style="font-size:12px;color:#999;">#${i + 1}</span></div>
                        <div class="card-body">
                            <div class="info-item"><span class="label">📦 Idadi</span><span class="value">${s.quantity || 0}</span></div>
                            <div class="info-item"><span class="label">💰 Bei</span><span class="value">${price} TSh</span></div>
                            <div class="info-item"><span class="label">💵 Jumla</span><span class="value amount">${total} TSh</span></div>
                        </div>
                        <div class="card-footer"><span>${date}</span></div>
                    </div>`;
                });

                container.innerHTML = html;

            } catch (error) {
                console.error('Load sales error:', error);
                document.getElementById('salesList').innerHTML = '<p class="no-sales" style="color:red;">❌ Error loading sales</p>';
            }
        }

        async function checkStaffType() {
            try {
                const res = await fetch(`${API_URL}/users/me`, { headers: { 'Authorization': 'Bearer ' + token } });
                if (res.ok) {
                    const user = await res.json();
                    if (user.staff_type !== 'shop') {
                        if (user.staff_type === 'agent') { window.location.href = 'agent_dashboard.html'; }
                        else if (user.role === 'admin') { window.location.href = 'index.html'; }
                    }
                }
            } catch (e) { console.error('Check staff type error:', e); }
        }

        checkStaffType();
        loadMySales();
        setInterval(loadMySales, 30000);
    </script>
</body>
</html>
