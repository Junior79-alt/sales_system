<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Styling yako hapa - same as before */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f0f2f5; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }

        header {
            background: linear-gradient(135deg, #1a237e, #0d47a1);
            color: white;
            padding: 20px 30px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        header h1 { font-size: 24px; }
        .header-right { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .header-right a {
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border-radius: 6px;
        }
        .header-right a:hover { background: rgba(255,255,255,0.3); }
        .logout-btn {
            background: #d32f2f;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }
        .logout-btn:hover { background: #b71c1c; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .stat-icon { font-size: 36px; }
        .stat-content h3 { font-size: 14px; color: #666; }
        .stat-content p { font-size: 24px; font-weight: bold; color: #1a237e; }

        /* Staff Filter */
        .filter-section {
            background: white;
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .filter-section label {
            font-weight: bold;
            color: #1a237e;
            font-size: 16px;
        }
        .filter-section select {
            padding: 10px 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            min-width: 250px;
        }
        .filter-section button {
            padding: 10px 25px;
            background: #1a237e;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        .filter-section button:hover { background: #0d47a1; }
        .filter-section .clear-btn {
            background: #666;
        }
        .filter-section .clear-btn:hover { background: #444; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .chart-container, .recent-sales {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .chart-container h3, .recent-sales h3 { color: #1a237e; margin-bottom: 15px; }
        .recent-sale-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        .recent-sale-item:last-child { border-bottom: none; }
        .recent-sale-item .product { font-weight: 600; }
        .recent-sale-item .amount { color: #1a237e; font-weight: bold; }

        .table-container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .table-container h3 { color: #1a237e; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1a237e; color: white; padding: 12px; text-align: left; }
        td { padding: 10px 12px; border-bottom: 1px solid #eee; }
        tr:hover { background: #f5f5f5; }
        .delete-btn {
            background: #d32f2f;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        .delete-btn:hover { background: #b71c1c; }
        .staff-label {
            background: #e8eaf6;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            color: #1a237e;
        }

        @media (max-width: 768px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            header { flex-direction: column; text-align: center; }
            .header-right { justify-content: center; }
            .filter-section { flex-direction: column; align-items: stretch; }
            .filter-section select { min-width: auto; width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 ADMIN DASHBOARD</h1>
            <div class="header-right">
                <span id="adminName">Admin</span>
                <a href="users.html">👥 Watumiaji</a>
                <a href="all_sales.html">📋 Mauzo Yote</a>
                <button onclick="logout()" class="logout-btn">🚪 Toka</button>
            </div>
        </header>

        <!-- STATS -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">💰</div>
                <div class="stat-content">
                    <h3>Jumla ya Mauzo</h3>
                    <p id="totalSales">0 TSh</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📦</div>
                <div class="stat-content">
                    <h3>Bidhaa Zilizouzwa</h3>
                    <p id="totalProducts">0</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📋</div>
                <div class="stat-content">
                    <h3>Idadi ya Mauzo</h3>
                    <p id="totalSalesCount">0</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">👤</div>
                <div class="stat-content">
                    <h3>Watumiaji</h3>
                    <p id="totalUsers">0</p>
                </div>
            </div>
        </div>

        <!-- FILTER BY STAFF -->
        <div class="filter-section">
            <label for="staffFilter">👥 Chagua Staff:</label>
            <select id="staffFilter">
                <option value="all">✅ Mauzo Yote</option>
            </select>
            <button onclick="filterSales()">🔍 Angalia</button>
            <button onclick="clearFilter()" class="clear-btn">🔄 Ondoa Filter</button>
        </div>

        <!-- CHART + RECENT -->
        <div class="dashboard-grid">
            <div class="chart-container">
                <h3>Mauzo kwa Siku</h3>
                <canvas id="salesChart"></canvas>
            </div>
            <div class="recent-sales">
                <h3>Mauzo ya Hivi Karibuni</h3>
                <div id="recentSalesList"><p>Loading...</p></div>
            </div>
        </div>

        <!-- TABLE -->
        <div class="table-container">
            <h3 id="tableTitle">📋 Mauzo Yote</h3>
            <div id="allSalesList"><p style="text-align:center;padding:20px;">Loading...</p></div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        const token = localStorage.getItem('token');

        if (!token) {
            window.location.href = 'login.html';
        }

        const role = localStorage.getItem('userRole');
        if (role && role.toLowerCase() !== 'admin') {
            window.location.href = 'staff.html';
        }

        let allStaff = [];
        let currentFilter = 'all';

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('userEmail');
            localStorage.removeItem('userRole');
            window.location.href = 'login.html';
        }

        // ===== FETCH SALES =====
        async function fetchSales(staffId = null) {
            let url = `${API_URL}/sales/`;
            if (staffId && staffId !== 'all') {
                url = `${API_URL}/sales/staff/${staffId}`;
            }
            try {
                const res = await fetch(url, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (!res.ok) throw new Error('Failed');
                return await res.json();
            } catch (e) {
                console.error('Fetch sales error:', e);
                return [];
            }
        }

        // ===== FETCH ALL STAFF =====
        async function fetchAllStaff() {
            try {
                const res = await fetch(`${API_URL}/users/all`);
                if (!res.ok) throw new Error('Failed');
                const users = await res.json();
                // Chukua staff tu (si admin)
                allStaff = users.filter(u => u.role.toLowerCase() === 'staff');
                populateStaffDropdown();
            } catch (e) {
                console.error('Fetch staff error:', e);
            }
        }

        // ===== POPULATE DROPDOWN =====
        function populateStaffDropdown() {
            const select = document.getElementById('staffFilter');
            // Keep the "All" option
            select.innerHTML = '<option value="all">✅ Mauzo Yote</option>';
            allStaff.forEach(staff => {
                const option = document.createElement('option');
                option.value = staff.id;
                option.textContent = `${staff.name} (${staff.email})`;
                select.appendChild(option);
            });
        }

        // ===== FILTER SALES =====
        function filterSales() {
            const select = document.getElementById('staffFilter');
            currentFilter = select.value;
            loadData(currentFilter);
        }

        // ===== CLEAR FILTER =====
        function clearFilter() {
            document.getElementById('staffFilter').value = 'all';
            currentFilter = 'all';
            loadData('all');
        }

        // ===== DELETE SALE =====
        async function deleteSale(saleId) {
            const confirmDelete = confirm('⚠️ Je, una uhakika unataka kufuta mauzo haya? Hatua hii haiwezi kurekebishwa!');
            if (!confirmDelete) return;

            try {
                const response = await fetch(`${API_URL}/sales/${saleId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                const data = await response.json();

                if (response.ok) {
                    alert('✅ Mauzo yamefutwa!');
                    loadData(currentFilter);
                } else {
                    alert('❌ ' + (data.detail || 'Failed to delete sale!'));
                }
            } catch (error) {
                console.error('Delete error:', error);
                alert('❌ Error: ' + error.message);
            }
        }

        // ===== LOAD DATA =====
        async function loadData(filter = 'all') {
            const sales = await fetchSales(filter);
            
            // Update stats
            let totalAmount = 0, totalQty = 0;
            sales.forEach(s => {
                totalAmount += s.total_amount || 0;
                totalQty += s.quantity || 0;
            });
            document.getElementById('totalSales').textContent = totalAmount.toLocaleString() + ' TSh';
            document.getElementById('totalProducts').textContent = totalQty;
            document.getElementById('totalSalesCount').textContent = sales.length;

            // Update table title
            const title = document.getElementById('tableTitle');
            if (filter === 'all') {
                title.textContent = '📋 Mauzo Yote';
            } else {
                const staff = allStaff.find(s => s.id == filter);
                title.textContent = `📋 Mauzo ya ${staff ? staff.name : 'Staff'}`;
            }

            // Update table
            const container = document.getElementById('allSalesList');
            if (!sales || sales.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:#999;">Hakuna mauzo</p>';
                return;
            }

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Bidhaa</th>
                            <th>Idadi</th>
                            <th>Bei</th>
                            <th>Jumla</th>
                            <th>Staff</th>
                            <th>Tarehe</th>
                            <th>Kitendo</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            sales.forEach((s, i) => {
                const staffName = allStaff.find(st => st.id === s.user_id);
                html += `
                    <tr>
                        <td>${i+1}</td>
                        <td><strong>${s.product_name || '-'}</strong></td>
                        <td>${s.quantity || 0}</td>
                        <td>${(s.price || 0).toLocaleString()} TSh</td>
                        <td><strong>${(s.total_amount || 0).toLocaleString()} TSh</strong></td>
                        <td><span class="staff-label">${staffName ? staffName.name : s.user_id}</span></td>
                        <td>${s.date ? new Date(s.date).toLocaleString('sw-TZ') : '-'}</td>
                        <td>
                            <button onclick="deleteSale(${s.id})" class="delete-btn">🗑️ Futa</button>
                        </td>
                    </tr>
                `;
            });
            html += '</tbody></table>';
            container.innerHTML = html;

            // Update recent
            const recentContainer = document.getElementById('recentSalesList');
            const recent = sales.slice(-5).reverse();
            if (!recent || recent.length === 0) {
                recentContainer.innerHTML = '<p style="color:#999;">Hakuna mauzo ya hivi karibuni</p>';
            } else {
                recentContainer.innerHTML = recent.map(s => `
                    <div class="recent-sale-item">
                        <span class="product">${s.product_name || '-'}</span>
                        <span>${s.quantity || 0} x ${(s.price || 0).toLocaleString()} TSh</span>
                        <span class="amount">${(s.total_amount || 0).toLocaleString()} TSh</span>
                    </div>
                `).join('');
            }

            // Update chart
            updateChart(sales);
        }

        // ===== UPDATE CHART =====
        function updateChart(sales) {
            const ctx = document.getElementById('salesChart').getContext('2d');
            const byDate = {};
            sales.forEach(s => {
                const d = s.date ? s.date.split('T')[0] : 'Unknown';
                byDate[d] = (byDate[d] || 0) + (s.total_amount || 0);
            });
            const labels = Object.keys(byDate).sort();
            const data = labels.map(l => byDate[l]);
            if (window.salesChartInstance) window.salesChartInstance.destroy();
            window.salesChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels.length ? labels : ['Hakuna'],
                    datasets: [{
                        label: 'Mauzo (TSh)',
                        data: data.length ? data : [0],
                        backgroundColor: 'rgba(26,35,126,0.7)',
                        borderColor: '#1a237e',
                        borderWidth: 2,
                        borderRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { callback: v => v.toLocaleString() + ' TSh' }
                        }
                    }
                }
            });
        }

        // ===== LOAD USERS COUNT =====
        async function loadUsersCount() {
            try {
                const res = await fetch(`${API_URL}/users/all`);
                if (res.ok) {
                    const users = await res.json();
                    document.getElementById('totalUsers').textContent = users.length;
                }
            } catch (e) {
                document.getElementById('totalUsers').textContent = '?';
            }
        }

        // ===== LOAD ADMIN NAME =====
        async function loadAdminName() {
            try {
                const res = await fetch(`${API_URL}/users/me`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (res.ok) {
                    const user = await res.json();
                    document.getElementById('adminName').textContent = user.email;
                }
            } catch (e) {}
        }

        // ===== INIT =====
        async function init() {
            await loadAdminName();
            await fetchAllStaff();
            await loadData('all');
            await loadUsersCount();

            // Enter key triggers filter
            document.getElementById('staffFilter').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') filterSales();
            });
        }

        init();

        // Auto refresh every 30 seconds
        setInterval(() => {
            loadData(currentFilter);
            loadUsersCount();
        }, 30000);
    </script>
</body>
</html>
