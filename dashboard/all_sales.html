<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Sales - Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f0f2f5; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }

        header {
            background: #1a237e;
            color: white;
            padding: 15px 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        header h1 { font-size: 20px; }
        .logout-btn {
            background: #d32f2f;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }
        .logout-btn:hover { background: #b71c1c; }

        .back-link {
            display: inline-block;
            margin: 20px 0;
            color: #1a237e;
            text-decoration: none;
        }
        .back-link:hover { text-decoration: underline; }

        .stats {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .stats div {
            background: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .stats span { font-weight: bold; color: #1a237e; }

        .sales-cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }

        .sale-card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-left: 5px solid #1a237e;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .sale-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
        }

        .sale-card .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .sale-card .card-header .product-name {
            font-size: 18px;
            font-weight: bold;
            color: #1a237e;
        }

        .sale-card .card-header .product-id {
            font-size: 12px;
            color: #999;
            background: #f5f5f5;
            padding: 2px 10px;
            border-radius: 12px;
        }

        .sale-card .card-body {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        .sale-card .card-body .info-item {
            text-align: center;
            padding: 8px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .sale-card .card-body .info-item .label {
            font-size: 11px;
            color: #888;
            display: block;
        }

        .sale-card .card-body .info-item .value {
            font-size: 16px;
            font-weight: bold;
            color: #1a237e;
        }

        .sale-card .card-body .info-item .value.amount {
            color: #2e7d32;
        }

        .sale-card .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 10px;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: #888;
            flex-wrap: wrap;
            gap: 8px;
        }

        .sale-card .card-footer .staff-badge {
            background: #e8eaf6;
            padding: 2px 12px;
            border-radius: 12px;
            color: #1a237e;
            font-weight: bold;
            font-size: 12px;
        }

        .sale-card .card-footer .delete-btn {
            background: #d32f2f;
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .sale-card .card-footer .delete-btn:hover {
            background: #b71c1c;
        }

        .no-sales {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 16px;
        }

        @media (max-width: 768px) {
            body { padding: 10px; }
            header { flex-direction: column; text-align: center; }
            .stats { flex-direction: column; }
            .stats div { text-align: center; }
            .sales-cards-grid { grid-template-columns: 1fr; }
            .sale-card .card-body { grid-template-columns: 1fr 1fr; }
            .sale-card .card-footer { flex-direction: column; text-align: center; }
        }

        @media (max-width: 480px) {
            .sale-card .card-body { grid-template-columns: 1fr 1fr; gap: 6px; }
            .sale-card .card-body .info-item { padding: 6px; }
            .sale-card .card-body .info-item .value { font-size: 14px; }
        }

        @media (min-width: 769px) and (max-width: 1024px) {
            .sales-cards-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 MAUZO YOTE - Admin</h1>
            <button onclick="logout()" class="logout-btn">🚪 Toka</button>
        </header>

        <a href="index.html" class="back-link">← Rudi Dashboard</a>

        <div class="stats">
            <div>💰 Jumla: <span id="totalAll">0 TSh</span></div>
            <div>📦 Bidhaa: <span id="totalProducts">0</span></div>
            <div>📋 Mauzo: <span id="totalSales">0</span></div>
        </div>

        <div id="salesList" class="sales-cards-grid">
            <p class="no-sales">Loading...</p>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        const token = localStorage.getItem('token');

        if (!token) {
            window.location.href = 'login.html';
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('userEmail');
            localStorage.removeItem('userRole');
            window.location.href = 'login.html';
        }

        async function deleteSale(saleId) {
            if (!confirm('⚠️ Je, una uhakika unataka kufuta mauzo haya? Hatua hii haiwezi kurekebishwa!')) return;

            try {
                const response = await fetch(`${API_URL}/sales/${saleId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                const data = await response.json();

                if (response.ok) {
                    alert('✅ Mauzo yamefutwa!');
                    loadAllSales();
                } else {
                    alert('❌ ' + (data.detail || 'Failed to delete sale!'));
                }
            } catch (error) {
                console.error('Delete error:', error);
                alert('❌ Error: ' + error.message);
            }
        }

        async function loadAllSales() {
            try {
                const res = await fetch(`${API_URL}/sales/`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (!res.ok) throw new Error('Failed');

                const sales = await res.json();
                const container = document.getElementById('salesList');

                let totalAmount = 0, totalQty = 0;
                sales.forEach(s => {
                    totalAmount += s.total_amount || 0;
                    totalQty += s.quantity || 0;
                });

                document.getElementById('totalAll').textContent = totalAmount.toLocaleString() + ' TSh';
                document.getElementById('totalProducts').textContent = totalQty;
                document.getElementById('totalSales').textContent = sales.length;

                if (!sales || sales.length === 0) {
                    container.innerHTML = '<p class="no-sales">📭 Hakuna mauzo</p>';
                    return;
                }

                let html = '';
                sales.forEach((s, i) => {
                    const date = s.date ? new Date(s.date).toLocaleString('sw-TZ') : '-';
                    const total = (s.total_amount || 0).toLocaleString();
                    const price = (s.price || 0).toLocaleString();

                    html += `
                        <div class="sale-card" style="border-left-color: ${i % 2 === 0 ? '#1a237e' : '#2e7d32'};">
                            <div class="card-header">
                                <span class="product-name">${s.product_name || '-'}</span>
                                <span class="product-id">#${i + 1}</span>
                            </div>
                            <div class="card-body">
                                <div class="info-item">
                                    <span class="label">📦 Idadi</span>
                                    <span class="value">${s.quantity || 0}</span>
                                </div>
                                <div class="info-item">
                                    <span class="label">💰 Bei</span>
                                    <span class="value">${price} TSh</span>
                                </div>
                                <div class="info-item">
                                    <span class="label">💵 Jumla</span>
                                    <span class="value amount">${total} TSh</span>
                                </div>
                            </div>
                            <div class="card-footer">
                                <span class="staff-badge">👤 Staff #${s.user_id || '-'}</span>
                                <span>${date}</span>
                                <button onclick="deleteSale(${s.id})" class="delete-btn">🗑️ Futa</button>
                            </div>
                        </div>
                    `;
                });

                container.innerHTML = html;

            } catch (e) {
                console.error('Load sales error:', e);
                document.getElementById('salesList').innerHTML = '<p class="no-sales" style="color:red;">❌ Error: ' + e.message + '</p>';
            }
        }

        loadAllSales();
        setInterval(loadAllSales, 30000);
    </script>
</body>
</html>
