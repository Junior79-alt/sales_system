<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Sales - Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f0f2f5; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }

        header {
            background: #1a237e;
            color: white;
            padding: 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        header h1 { font-size: 24px; }
        .logout-btn {
            background: #d32f2f;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }
        .logout-btn:hover { background: #b71c1c; }

        .back-link {
            display: inline-block;
            margin: 20px 0;
            color: #1a237e;
            text-decoration: none;
        }
        .back-link:hover { text-decoration: underline; }

        .filter-section {
            background: white;
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .filter-section label {
            font-weight: bold;
            color: #1a237e;
            font-size: 16px;
        }
        .filter-section select {
            padding: 10px 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            min-width: 250px;
        }
        .filter-section button {
            padding: 10px 25px;
            background: #1a237e;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        .filter-section button:hover { background: #0d47a1; }
        .filter-section .clear-btn {
            background: #666;
        }
        .filter-section .clear-btn:hover { background: #444; }

        .stats {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .stats div {
            background: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .stats span { font-weight: bold; color: #1a237e; }

        .table-container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #1a237e; color: white; padding: 12px; text-align: left; }
        td { padding: 10px 12px; border-bottom: 1px solid #eee; }
        tr:hover { background: #f5f5f5; }

        .delete-btn {
            background: #d32f2f;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        .delete-btn:hover { background: #b71c1c; }
        .staff-label {
            background: #e8eaf6;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            color: #1a237e;
        }

        @media (max-width: 768px) {
            header { flex-direction: column; text-align: center; gap: 10px; }
            .stats { flex-direction: column; }
            .stats div { text-align: center; }
            .filter-section { flex-direction: column; align-items: stretch; }
            .filter-section select { min-width: auto; width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 MAUZO YOTE - Admin</h1>
            <button onclick="logout()" class="logout-btn">🚪 Toka</button>
        </header>

        <a href="index.html" class="back-link">← Rudi Dashboard</a>

        <!-- FILTER BY STAFF -->
        <div class="filter-section">
            <label for="staffFilter">👥 Chagua Staff:</label>
            <select id="staffFilter">
                <option value="all">✅ Mauzo Yote</option>
            </select>
            <button onclick="filterSales()">🔍 Angalia</button>
            <button onclick="clearFilter()" class="clear-btn">🔄 Ondoa Filter</button>
        </div>

        <div class="stats">
            <div>💰 Jumla: <span id="totalAll">0 TSh</span></div>
            <div>📦 Bidhaa: <span id="totalProducts">0</span></div>
            <div>📋 Mauzo: <span id="totalSales">0</span></div>
        </div>

        <div class="table-container">
            <div id="salesList"><p style="text-align:center;padding:20px;">Loading...</p></div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        const token = localStorage.getItem('token');

        if (!token) {
            window.location.href = 'login.html';
        }

        let allStaff = [];
        let currentFilter = 'all';

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('userEmail');
            localStorage.removeItem('userRole');
            window.location.href = 'login.html';
        }

        // ===== FETCH STAFF =====
        async function fetchAllStaff() {
            try {
                const res = await fetch(`${API_URL}/users/all`);
                if (!res.ok) throw new Error('Failed');
                const users = await res.json();
                allStaff = users.filter(u => u.role.toLowerCase() === 'staff');
                populateStaffDropdown();
            } catch (e) {
                console.error('Fetch staff error:', e);
            }
        }

        function populateStaffDropdown() {
            const select = document.getElementById('staffFilter');
            select.innerHTML = '<option value="all">✅ Mauzo Yote</option>';
            allStaff.forEach(staff => {
                const option = document.createElement('option');
                option.value = staff.id;
                option.textContent = `${staff.name} (${staff.email})`;
                select.appendChild(option);
            });
        }

        // ===== FILTER =====
        function filterSales() {
            currentFilter = document.getElementById('staffFilter').value;
            loadAllSales(currentFilter);
        }

        function clearFilter() {
            document.getElementById('staffFilter').value = 'all';
            currentFilter = 'all';
            loadAllSales('all');
        }

        // ===== DELETE SALE =====
        async function deleteSale(saleId) {
            const confirmDelete = confirm('⚠️ Je, una uhakika unataka kufuta mauzo haya? Hatua hii haiwezi kurekebishwa!');
            if (!confirmDelete) return;

            try {
                const response = await fetch(`${API_URL}/sales/${saleId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                const data = await response.json();

                if (response.ok) {
                    alert('✅ Mauzo yamefutwa!');
                    loadAllSales(currentFilter);
                } else {
                    alert('❌ ' + (data.detail || 'Failed to delete sale!'));
                }
            } catch (error) {
                console.error('Delete error:', error);
                alert('❌ Error: ' + error.message);
            }
        }

        // ===== LOAD SALES =====
        async function loadAllSales(filter = 'all') {
            try {
                let url = `${API_URL}/sales/`;
                if (filter && filter !== 'all') {
                    url = `${API_URL}/sales/staff/${filter}`;
                }

                const res = await fetch(url, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (!res.ok) throw new Error('Failed');

                const sales = await res.json();
                const container = document.getElementById('salesList');

                let totalAmount = 0, totalQty = 0;
                sales.forEach(s => {
                    totalAmount += s.total_amount || 0;
                    totalQty += s.quantity || 0;
                });

                document.getElementById('totalAll').textContent = totalAmount.toLocaleString() + ' TSh';
                document.getElementById('totalProducts').textContent = totalQty;
                document.getElementById('totalSales').textContent = sales.length;

                if (!sales || sales.length === 0) {
                    container.innerHTML = '<p style="text-align:center;color:#999;">Hakuna mauzo</p>';
                    return;
                }

                let html = `
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Bidhaa</th>
                                <th>Idadi</th>
                                <th>Bei</th>
                                <th>Jumla</th>
                                <th>Staff</th>
                                <th>Tarehe</th>
                                <th>Kitendo</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                sales.forEach((s, i) => {
                    const staffName = allStaff.find(st => st.id === s.user_id);
                    html += `
                        <tr>
                            <td>${i+1}</td>
                            <td><strong>${s.product_name || '-'}</strong></td>
                            <td>${s.quantity || 0}</td>
                            <td>${(s.price || 0).toLocaleString()} TSh</td>
                            <td><strong>${(s.total_amount || 0).toLocaleString()} TSh</strong></td>
                            <td><span class="staff-label">${staffName ? staffName.name : s.user_id}</span></td>
                            <td>${s.date ? new Date(s.date).toLocaleString('sw-TZ') : '-'}</td>
                            <td>
                                <button onclick="deleteSale(${s.id})" class="delete-btn">🗑️ Futa</button>
                            </td>
                        </tr>
                    `;
                });

                html += '</tbody></table>';
                container.innerHTML = html;

            } catch (e) {
                console.error('Load sales error:', e);
                document.getElementById('salesList').innerHTML = '<p style="color:red;">❌ Error: ' + e.message + '</p>';
            }
        }

        // ===== INIT =====
        async function init() {
            await fetchAllStaff();
            await loadAllSales('all');

            document.getElementById('staffFilter').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') filterSales();
            });
        }

        init();
        setInterval(() => loadAllSales(currentFilter), 30000);
    </script>
</body>
</html>
