<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sales System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a237e, #0d47a1);
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            width: 380px;
        }
        .login-box h1 { text-align: center; color: #1a237e; margin-bottom: 5px; }
        .login-box .subtitle { text-align: center; color: #666; margin-bottom: 25px; font-size: 14px; }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .login-box button {
            width: 100%;
            padding: 12px;
            background: #1a237e;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
        }
        .login-box button:hover { background: #0d47a1; }
        .login-box .register-link { text-align: center; margin-top: 15px; font-size: 14px; }
        .login-box .register-link a { color: #1a237e; text-decoration: none; font-weight: bold; }
        .login-box .register-link a:hover { text-decoration: underline; }
        .login-box .msg { text-align: center; margin-top: 10px; font-size: 14px; min-height: 20px; font-weight: bold; }
        .login-box .msg.error { color: #d32f2f; }
        .login-box .msg.success { color: #2e7d32; }
        .login-box .demo-info {
            margin-top: 20px;
            padding: 12px;
            background: #f5f5f5;
            border-radius: 8px;
            font-size: 13px;
            color: #555;
        }
        .login-box .demo-info strong { color: #1a237e; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🔐 Ingia</h1>
        <p class="subtitle">Ingia kwenye mfumo wako</p>
        <input type="email" id="email" placeholder="Email" value="admin3@test.com">
        <input type="password" id="password" placeholder="Password" value="Admin123">
        <button onclick="login()">Ingia</button>
        <div id="msg" class="msg"></div>
        <div class="register-link">Huna akaunti? <a href="register.html">Jisajili hapa</a></div>
        <div class="demo-info">
            <strong>Demo Account:</strong><br>
            Email: admin3@test.com<br>
            Password: Admin123
        </div>
    </div>
    <script>
        const API_URL = window.location.origin;

        async function login() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const msg = document.getElementById('msg');

            if (!email || !password) {
                msg.textContent = '❌ Tafadhali jaza email na password!';
                msg.className = 'msg error';
                return;
            }

            msg.textContent = '⏳ Inaingiza...';
            msg.className = 'msg';

            try {
                const response = await fetch(`${API_URL}/users/login`, {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Basic ' + btoa(email + ':' + password)
                    }
                });

                const data = await response.json();

                if (!response.ok) {
                    msg.textContent = '❌ ' + (data.detail || 'Email au Password si sahihi!');
                    msg.className = 'msg error';
                    return;
                }

                // Hifadhi data zote
                localStorage.setItem('token', data.access_token);
                localStorage.setItem('userEmail', email);
                localStorage.setItem('userRole', data.role || 'staff');

                msg.textContent = '✅ Inaingiza...';
                msg.className = 'msg success';

                setTimeout(() => {
                    const role = (data.role || 'staff').toLowerCase();
                    if (role === 'admin') {
                        window.location.href = 'index.html';
                    } else {
                        window.location.href = 'staff.html';
                    }
                }, 500);

            } catch (error) {
                msg.textContent = '❌ Error: ' + error.message;
                msg.className = 'msg error';
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') login();
        });

        // Kama tayari ameingia
        const token = localStorage.getItem('token');
        const role = localStorage.getItem('userRole');
        if (token) {
            if (role && role.toLowerCase() === 'admin') {
                window.location.href = 'index.html';
            } else {
                window.location.href = 'staff.html';
            }
        }
    </script>
</body>
</html>
