<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Sales System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a237e, #0d47a1);
            padding: 20px;
        }
        .register-box {
            background: white;
            padding: 40px 35px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            transition: all 0.3s ease;
        }
        .register-box h1 {
            text-align: center;
            color: #1a237e;
            margin-bottom: 5px;
            font-size: 28px;
        }
        .register-box .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 25px;
            font-size: 14px;
        }
        .register-box input {
            width: 100%;
            padding: 12px 15px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        .register-box input:focus {
            border-color: #1a237e;
            outline: none;
        }
        .register-box button {
            width: 100%;
            padding: 12px;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
            font-weight: 600;
        }
        .register-box button:hover {
            background: #1b5e20;
        }
        .register-box .login-link {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }
        .register-box .login-link a {
            color: #1a237e;
            text-decoration: none;
            font-weight: bold;
        }
        .register-box .login-link a:hover {
            text-decoration: underline;
        }
        .register-box .msg {
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            min-height: 20px;
            font-weight: bold;
        }
        .register-box .msg.error {
            color: #d32f2f;
        }
        .register-box .msg.success {
            color: #2e7d32;
        }
        .register-box .info-box {
            background: #e8eaf6;
            padding: 12px 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 13px;
            color: #555;
            text-align: center;
        }
        .register-box .info-box strong {
            color: #1a237e;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .register-box {
                padding: 25px 20px;
                max-width: 100%;
                margin: 10px;
                border-radius: 12px;
            }
            .register-box h1 {
                font-size: 22px;
            }
            .register-box input {
                padding: 10px 12px;
                font-size: 14px;
            }
            .register-box button {
                font-size: 16px;
                padding: 10px;
            }
            .register-box .subtitle {
                font-size: 13px;
            }
            .register-box .info-box {
                font-size: 12px;
                padding: 10px;
            }
        }

        @media (max-width: 380px) {
            .register-box {
                padding: 20px 15px;
            }
            .register-box h1 {
                font-size: 20px;
            }
            .register-box .login-link {
                font-size: 13px;
            }
        }

        @media (min-width: 600px) and (max-width: 1024px) {
            .register-box {
                max-width: 450px;
                padding: 45px 40px;
            }
        }

        @media (min-width: 1025px) {
            .register-box {
                max-width: 420px;
                padding: 50px 45px;
            }
        }
    </style>
</head>
<body>

    <div class="register-box">
        <h1>📝 Jisajili</h1>
        <p class="subtitle">Unda akaunti yako mpya</p>

        <!-- FORM - HAKUNA CHAGUO LA ADMIN -->
        <input type="text" id="name" placeholder="Jina lako" value="Staff Msaidizi">
        <input type="email" id="email" placeholder="Email" value="staff@test.com">
        <input type="password" id="password" placeholder="Password (min 6)" value="staff123">
        <input type="password" id="confirm" placeholder="Rudia Password" value="staff123">

        <button onclick="register()">Jisajili</button>

        <div id="msg" class="msg"></div>

        <div class="login-link">
            Tuna akaunti? <a href="login.html">Ingia hapa</a>
        </div>

        <div class="info-box">
            <strong>ℹ️ Kumbuka:</strong> Baada ya kujisajili, subiri Admin aku-activate.
            Admin pekee ndiye anaweza kujisajili moja kwa moja.
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;

        async function register() {
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const confirm = document.getElementById('confirm').value.trim();
            const msg = document.getElementById('msg');

            if (!name || !email || !password || !confirm) {
                msg.textContent = '❌ Tafadhali jaza taarifa zote!';
                msg.className = 'msg error';
                return;
            }

            if (password !== confirm) {
                msg.textContent = '❌ Password hazifanani!';
                msg.className = 'msg error';
                return;
            }

            if (password.length < 6) {
                msg.textContent = '❌ Password iwe na angalau herufi 6!';
                msg.className = 'msg error';
                return;
            }

            msg.textContent = '⏳ Inaandikisha...';
            msg.className = 'msg';

            try {
                // Role ni staff tu - hakuna chaguo la admin
                const response = await fetch(
                    `${API_URL}/users/register?name=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}&role=staff`,
                    { method: 'POST' }
                );

                const data = await response.json();

                if (!response.ok) {
                    msg.textContent = '❌ ' + (data.detail || 'Registration failed!');
                    msg.className = 'msg error';
                    return;
                }

                msg.textContent = '✅ ' + data.message;
                msg.className = 'msg success';

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2500);

            } catch (error) {
                msg.textContent = '❌ Error: ' + error.message;
                msg.className = 'msg error';
            }
        }

        // ===== ENTER KEY =====
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                register();
            }
        });

        // ===== AUTO REDIRECT IF LOGGED IN =====
        if (localStorage.getItem('token')) {
            const role = localStorage.getItem('userRole');
            if (role && role.toLowerCase() === 'admin') {
                window.location.href = 'index.html';
            } else {
                window.location.href = 'staff.html';
            }
        }
    </script>
</body>
</html>
