services:
  - type: web
    name: sales-system-4
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sales_db
          property: connectionString
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false

  - type: cron
    name: database-backup
    runtime: python
    schedule: "0 6 * * *"  # 6:00 AM every day
    buildCommand: pip install -r requirements.txt
    startCommand: python backup.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sales_db
          property: connectionString
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: ALERT_EMAIL
        sync: false